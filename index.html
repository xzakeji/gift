<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<link rel="icon" href="favicon_001.ico" type="image/x-icon">
<title>火箭发射模拟器</title>
<meta name="robots" content="noindex,nofollow">
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:system-ui,sans-serif;}
body{
    overflow:hidden;
    height:100vh;
    background:#000212;
    color:#fff;
    touch-action:none;
}
/* 星空画布 */
#spaceCanvas{
    position:fixed;
    width:100%;
    height:100%;
    z-index:1;
}
/* 地面 */
.ground{
    position:fixed;
    bottom:0;
    width:100%;
    height:80px;
    background:linear-gradient(#222,#111);
    z-index:2;
}
/* 火箭 */
#rocket{
    position:fixed;
    left:50%;
    bottom:80px;
    transform:translateX(-50%);
    width:40px;
    height:120px;
    z-index:3;
    transition:none;
}
.rocket-body{
    width:100%;
    height:100%;
    position:relative;
}
.rocket-main{
    width:24px;
    height:80px;
    background:#f4f4f4;
    margin:0 auto;
    border-radius:12px 12px 4px 4px;
    position:relative;
}
.rocket-nose{
    width:14px;
    height:22px;
    background:#ff4444;
    margin:0 auto;
    border-radius:8px 8px 0 0;
}
.rocket-wing-left{
    position:absolute;
    left:-12px;
    bottom:10px;
    width:14px;
    height:30px;
    background:#ff4444;
    clip-path:polygon(100% 0, 100% 100%, 0 100%);
}
.rocket-wing-right{
    position:absolute;
    right:-12px;
    bottom:10px;
    width:14px;
    height:30px;
    background:#ff4444;
    clip-path:polygon(0 0, 100% 100%, 0 100%);
}
.flame{
    width:16px;
    height:0px;
    background:linear-gradient(#ffdd00,#ff5500,#ff2200);
    margin:0 auto;
    border-radius:0 0 50% 50%;
    transition:height 0.1s;
    filter:blur(2px);
}
/* UI面板 */
.ui-panel{
    position:fixed;
    left:50%;
    top:24px;
    transform:translateX(-50%);
    z-index:10;
    text-align:center;
}
#countText{
    font-size:42px;
    font-weight:bold;
    text-shadow:0 0 12px #fff800;
    min-height:52px;
}
.info-text{
    margin-top:8px;
    font-size:16px;
    color:#b0c4de;
}
.btn-group{
    position:fixed;
    bottom:100px;
    left:50%;
    transform:translateX(-50%);
    z-index:10;
    display:flex;
    gap:14px;
}
button{
    padding:12px 26px;
    font-size:17px;
    border:none;
    border-radius:999px;
    cursor:pointer;
    background:#2563eb;
    color:#fff;
    transition:0.2s;
    min-width:130px;
}
button:disabled{
    background:#334155;
    cursor:not-allowed;
    opacity:0.6;
}
button:active{
    transform:scale(0.96);
}
@media(max-width:600px){
    button{
        padding:10px 16px;
        font-size:15px;
        min-width:110px;
    }
    #countText{
        font-size:32px;
    }
}
/* 云层 */
.cloud{
    position:absolute;
    background:rgba(255,255,255,0.15);
    border-radius:50%;
    filter:blur(12px);
}
</style>
</head>
<body>
<canvas id="spaceCanvas"></canvas>

<div class="ui-panel">
    <div id="countText">火箭模拟器</div>
    <div class="info-text" id="statusText">点击【开始倒计时】启动任务</div>
</div>

<div id="rocket">
    <div class="rocket-body">
        <div class="rocket-nose"></div>
        <div class="rocket-main">
            <div class="rocket-wing-left"></div>
            <div class="rocket-wing-right"></div>
        </div>
        <div class="flame" id="flame"></div>
    </div>
</div>

<div class="ground"></div>

<div class="btn-group">
    <button id="startBtn">开始倒计时</button>
    <button id="resetBtn" disabled>重置火箭</button>
</div>

<script>
const canvas = document.getElementById('spaceCanvas');
const ctx = canvas.getContext('2d');
const rocketDom = document.getElementById('rocket');
const flameDom = document.getElementById('flame');
const countText = document.getElementById('countText');
const statusText = document.getElementById('statusText');
const startBtn = document.getElementById('startBtn');
const resetBtn = document.getElementById('resetBtn');

let width,height;
let stars = [];
let rocketY = 80;
let velocity = 0;
let isRunning = false;
let countdownNum = 10;
let animationId;

// 画布自适应
function resizeCanvas(){
    width = window.innerWidth;
    height = window.innerHeight;
    canvas.width = width;
    canvas.height = height;
    createStars();
}

// 生成星空
function createStars(){
    stars = [];
    for(let i=0;i<350;i++){
        stars.push({
            x:Math.random()*width,
            y:Math.random()*height,
            r:Math.random()*1.2+0.2,
            twinkle:Math.random()*0.03
        })
    }
}

// 绘制星空
function drawSpace(){
    ctx.fillStyle="#000212";
    ctx.fillRect(0,0,width,height);
    for(let s of stars){
        ctx.beginPath();
        ctx.arc(s.x,s.y,s.r,0,Math.PI*2);
        ctx.fillStyle=`rgba(255,255,255,${0.4+Math.sin(Date.now()*s.twinkle)*0.3})`;
        ctx.fill();
    }
}

// 重置全部状态
function resetAll(){
    cancelAnimationFrame(animationId);
    rocketY = 80;
    velocity = 0;
    isRunning = false;
    countdownNum = 10;
    rocketDom.style.bottom = rocketY+"px";
    flameDom.style.height = "0px";
    countText.textContent = "火箭模拟器";
    statusText.textContent = "点击【开始倒计时】启动任务";
    startBtn.disabled = false;
    resetBtn.disabled = true;
}

// 倒计时逻辑
async function startCountdown(){
    if(isRunning) return;
    isRunning = true;
    startBtn.disabled = true;
    resetBtn.disabled = false;

    countdownNum = 10;
    while(countdownNum >=0){
        countText.textContent = `T-${countdownNum}`;
        statusText.textContent = "发射准备中";
        await sleep(1000);
        countdownNum--;
    }
    // 点火
    countText.textContent = "点火升空！";
    flameDom.style.height = "60px";
    launchLoop();
}

// 火箭飞行动画
function launchLoop(){
    velocity += 0.18;
    rocketY += velocity;
    rocketDom.style.bottom = rocketY+"px";

    // 模拟高空分级
    if(rocketY > height*0.3 && rocketY < height*0.32){
        statusText.textContent = "一级助推器分离";
    }else if(rocketY > height*0.6 && rocketY < height*0.63){
        statusText.textContent = "二级发动机关机，准备入轨";
        flameDom.style.height = "10px";
    }else if(rocketY > height*0.85){
        statusText.textContent = "成功进入预定轨道 🎉";
        flameDom.style.height = "0px";
        return;
    }else{
        statusText.textContent = "持续爬升";
    }

    drawSpace();
    animationId = requestAnimationFrame(launchLoop);
}

function sleep(ms){
    return new Promise(res=>setTimeout(res,ms));
}

startBtn.onclick = startCountdown;
resetBtn.onclick = resetAll;
window.addEventListener('resize',resizeCanvas);
resizeCanvas();

// 渲染循环
function mainLoop(){
    drawSpace();
    animationId = requestAnimationFrame(mainLoop);
}
mainLoop();
</script>
</body>
</html>
